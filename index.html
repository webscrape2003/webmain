<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flexa Lite | Aura</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --accent: #22d3ee;
            --text-main: #ffffff;
            --text-dim: #666666;
            --border: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 1. FLEXA LITE STARTUP ANIMATION */
        #bootScreen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .aura-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            filter: blur(20px);
            animation: pulse 2s infinite alternate;
        }

        .boot-text {
            margin-top: -40px;
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeInText 1.5s forwards 0.5s;
        }

        @keyframes pulse { from { transform: scale(0.8); opacity: 0.3; } to { transform: scale(1.3); opacity: 0.6; } }
        @keyframes fadeInText { to { opacity: 1; letter-spacing: 12px; } }

        /* 2. MAIN INTERFACE */
        .app-container {
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            text-align: center;
            opacity: 0;
            transition: 1s ease;
        }

        .app-container.show { opacity: 1; }

        .logo-area { margin-bottom: 50px; }
        .logo-area h1 { font-weight: 800; font-size: 1.8rem; letter-spacing: -1px; }
        .logo-area span { color: var(--accent); }

        /* SERVER SELECTION - CLEAN LIST */
        .srv-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        .srv-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .srv-item:hover { border-color: #333; transform: scale(1.02); }

        .srv-item.selected {
            border-color: var(--accent);
            background: rgba(34, 211, 238, 0.03);
        }

        .srv-info { text-align: left; }
        .srv-name { display: block; font-weight: 600; font-size: 0.9rem; }
        .srv-region { display: block; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; margin-top: 2px; }

        .srv-ping {
            font-size: 0.7rem;
            color: var(--accent);
            background: rgba(34, 211, 238, 0.1);
            padding: 4px 10px;
            border-radius: 100px;
            font-weight: 600;
        }

        /* CONNECT BUTTON - FLOATING DESIGN */
        .btn-launch {
            width: 100%;
            padding: 22px;
            border-radius: 24px;
            border: none;
            background: var(--text-main);
            color: var(--bg);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 20px 40px rgba(255,255,255,0.1);
        }

        .btn-launch:disabled { background: #1a1a1a; color: #444; box-shadow: none; cursor: not-allowed; }
        .btn-launch:not(:disabled):hover { transform: translateY(-3px); box-shadow: 0 25px 50px rgba(34, 211, 238, 0.2); }

    </style>
</head>
<body>

    <div id="bootScreen">
        <div class="aura-ring"></div>
        <div class="boot-text">Flexa</div>
    </div>

    <div class="app-container" id="app">
        <div class="logo-area">
            <h1>Flexa<span>Lite</span></h1>
            <p style="color:var(--text-dim); font-size: 0.8rem; margin-top: 5px;">Secure Node Gateway</p>
        </div>

        <div class="srv-list">
            <div class="srv-item" onclick="pick(this, 'https://mv-movie-cb473d451f3b.herokuapp.com/')">
                <div class="srv-info">
                    <span class="srv-name">Cluster Alpha</span>
                    <span class="srv-region">North America</span>
                </div>
                <div class="srv-ping">12ms</div>
            </div>

            <div class="srv-item" onclick="pick(this, 'https://srv-two.com')">
                <div class="srv-info">
                    <span class="srv-name">Cluster Bravo</span>
                    <span class="srv-region">Europe Central</span>
                </div>
                <div class="srv-ping">24ms</div>
            </div>

            <div class="srv-item" onclick="pick(this, 'https://srv-three.com')">
                <div class="srv-info">
                    <span class="srv-name">Cluster Delta</span>
                    <span class="srv-region">Asia Pacific</span>
                </div>
                <div class="srv-ping">45ms</div>
            </div>
        </div>

        <input type="hidden" id="selectedUrl">
        <button class="btn-launch" id="btn" disabled onclick="connect()">Connect Node</button>
    </div>

    <script>
        // Start sequence
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('bootScreen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('bootScreen').style.display = 'none';
                    document.getElementById('app').classList.add('show');
                }, 800);
            }, 3000);
        };

        // Selection
        function pick(el, url) {
            document.querySelectorAll('.srv-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('selectedUrl').value = url;
            document.getElementById('btn').disabled = false;
        }

        // Connection Loading
        function connect() {
            const url = document.getElementById('selectedUrl').value;
            const boot = document.getElementById('bootScreen');
            
            // Show loading again with "Connecting"
            document.querySelector('.boot-text').innerText = "Linking";
            boot.style.display = 'flex';
            setTimeout(() => boot.style.opacity = '1', 10);

            setTimeout(() => {
                window.location.href = url;
            }, 2000);
        }
    </script>
</body>
</html>
