<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Selection | Professional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #050a18;
            --card-bg: rgba(16, 25, 47, 0.7);
            --accent: #22d3ee;
            --accent-glow: rgba(34, 211, 238, 0.2);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(51, 65, 85, 0.5);
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #050a18 70%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        h2 { font-size: 2rem; margin-bottom: 10px; letter-spacing: -1px; }
        p.subtitle { color: var(--text-dim); margin-bottom: 40px; }

        /* Server Grid */
        .server-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .server-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            text-align: left;
        }

        .server-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
            transform: translateY(-5px);
        }

        .server-card.selected {
            border-color: var(--accent);
            background: rgba(34, 211, 238, 0.05);
        }

        .server-card.selected::after {
            content: "\f058";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            top: 15px;
            right: 15px;
            color: var(--accent);
            font-size: 1.2rem;
        }

        .server-icon {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .server-name { font-weight: 700; font-size: 1.1rem; margin-bottom: 5px; }
        .server-meta { color: var(--text-dim); font-size: 0.85rem; display: flex; align-items: center; gap: 10px; }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
        }

        .ping-badge {
            background: rgba(255,255,255,0.05);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            border: 1px solid var(--border);
        }

        /* Action Button */
        .action-container { margin-top: 40px; }
        .btn-connect {
            background: var(--accent);
            color: #050a18;
            border: none;
            padding: 16px 60px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-connect:disabled {
            background: #1e293b;
            color: var(--text-dim);
            cursor: not-allowed;
        }

        .btn-connect:not(:disabled):hover {
            opacity: 0.9;
            box-shadow: 0 10px 25px var(--accent-glow);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Select Premium Server</h2>
    <p class="subtitle">Choose a high-speed node to begin your session</p>

    <div class="server-grid" id="serverGrid">
        <div class="server-card" onclick="selectServer(this, 'https://mv-movie-cb473d451f3b.herokuapp.com/')">
            <div class="server-icon"><i class="fas fa-bolt"></i></div>
            <div class="server-name">Premium Node 01</div>
            <div class="server-meta">
                <span class="status-dot"></span>
                Online
                <span class="ping-badge">24ms</span>
            </div>
        </div>

        <div class="server-card" onclick="selectServer(this, 'https://server-two-api.com')">
            <div class="server-icon"><i class="fas fa-rocket"></i></div>
            <div class="server-name">Fast Server 02</div>
            <div class="server-meta">
                <span class="status-dot"></span>
                Online
                <span class="ping-badge">45ms</span>
            </div>
        </div>

        <div class="server-card" onclick="selectServer(this, 'https://server-three-api.com')">
            <div class="server-icon"><i class="fas fa-shield-halved"></i></div>
            <div class="server-name">Stable Node 03</div>
            <div class="server-meta">
                <span class="status-dot"></span>
                Online
                <span class="ping-badge">12ms</span>
            </div>
        </div>
    </div>

    <div class="action-container">
        <input type="hidden" id="selectedUrl" value="">
        <button class="btn-connect" id="connectBtn" disabled onclick="handleConnect()">Proceed to Pair</button>
    </div>
</div>

<script>
    function selectServer(element, url) {
        // Remove selection from others
        document.querySelectorAll('.server-card').forEach(card => card.classList.remove('selected'));
        
        // Add selection to clicked
        element.classList.add('selected');
        
        // Update hidden value and enable button
        document.getElementById('selectedUrl').value = url;
        document.getElementById('connectBtn').disabled = false;
    }

    function handleConnect() {
        const url = document.getElementById('selectedUrl').value;
        alert("Connecting to: " + url);
        // Here you would redirect or trigger your pairing logic
    }
</script>

</body>
</html>
