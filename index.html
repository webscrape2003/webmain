<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vajira Bot Console</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background-color: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; }
        .console-wrapper { max-width: 900px; margin: 30px auto; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        .header { background: #1a1a1a; padding: 15px 20px; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; }
        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .red { background: #ff5f56; } .yellow { background: #ffbd2e; } .green { background: #27c93f; }
        #log-screen { height: 500px; overflow-y: auto; padding: 20px; background: #000; font-family: 'Consolas', monospace; font-size: 14px; line-height: 1.6; }
        .log-entry { margin-bottom: 15px; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .meta { color: #888; font-size: 12px; }
        .user { color: #27c93f; font-weight: bold; }
        .num { color: #ffbd2e; }
        .msg-text { color: #fff; margin-top: 5px; display: block; }
        .cmd-badge { background: #0078d4; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; text-transform: uppercase; margin-left: 10px; }
    </style>
</head>
<body>

<div class="console-wrapper">
    <div class="header">
        <div>
            <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
            <span style="margin-left: 10px; font-weight: bold;">LIVE BOT ACTIVITY MONITOR</span>
        </div>
        <div id="status" style="color: #27c93f; font-size: 12px;">● Connected</div>
    </div>
    <div id="log-screen">
        <div style="color: #888;">Waiting for incoming messages...</div>
    </div>
</div>

<script>
    const socket = io();
    const logScreen = document.getElementById('log-screen');

    socket.on('web_log', (data) => {
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        
        entry.innerHTML = `
            <div class="meta">
                [${data.time}] <span class="user">${data.user}</span> 
                (<span class="num">${data.number}</span>)
                ${data.isCommand ? `<span class="cmd-badge">🚀 ${data.command}</span>` : ''}
            </div>
            <span class="msg-text">> ${data.body}</span>
        `;

        // Keep latest logs at the top
        logScreen.prepend(entry);
    });

    socket.on('disconnect', () => {
        document.getElementById('status').innerHTML = "● Disconnected";
        document.getElementById('status').style.color = "#ff5f56";
    });
</script>

</body>
</html>
